<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>When will he finish? (Pause)</title>
  <meta name="description" content="A clock counting up since the paper was submitted — and everything that could have been done in the time it's taken to grade it." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="stage">

    <!-- ================= MAIN TIMER ================= -->
    <section class="board board--main">
      <p class="overline"><span class="dot"></span>It has been</p>

      <div class="clock" aria-live="polite">
        <div class="unit"><span class="num" id="m-days">0</span><span class="cap">days</span></div>
        <div class="unit"><span class="num" id="m-hours">00</span><span class="cap">hrs</span></div>
        <div class="unit"><span class="num" id="m-minutes">00</span><span class="cap">min</span></div>
        <div class="unit"><span class="num" id="m-seconds">00</span><span class="cap">sec</span></div>
      </div>

      <p class="since">since we submitted the paper.</p>
      <p class="ask">When will he finish? <span class="paper">(Pause)</span></p>
      <p class="cta">Finish grading</p>
    </section>

    <!-- ================= SECOND (MINI) TIMER ================= -->
    <section class="board board--mini">
      <p class="overline"><span class="dot"></span>It has been</p>

      <div class="clock clock--mini" aria-live="polite">
        <div class="unit"><span class="num" id="r-days">0</span><span class="cap">days</span></div>
        <div class="unit"><span class="num" id="r-hours">00</span><span class="cap">hrs</span></div>
        <div class="unit"><span class="num" id="r-minutes">00</span><span class="cap">min</span></div>
        <div class="unit"><span class="num" id="r-seconds">00</span><span class="cap">sec</span></div>
      </div>

      <p class="since">since the optional retake was due.</p>
      <p class="ask">When will he finish? <span class="paper">(Pause)</span></p>
      <p class="cta">Finish grading</p>
    </section>

    <!-- ================= ACTIVITIES ================= -->
    <section class="list-section">
      <h2 class="list-title">In this time, he could have—</h2>
      <ul class="activity-list" id="activityList"></ul>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
