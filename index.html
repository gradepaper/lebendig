<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Still going — a live grading counter</title>
  <meta name="description" content="A live counter ticking up from May 18, 2026 — and everything he could've done in the time it's taking to grade the paper." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,600;1,9..144,900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="sheet">
    <header class="masthead">
      <p class="kicker">a live experiment<br />in elapsed time</p>
      <p class="stamp">est.<br />05·18·26</p>
    </header>

    <section class="timer-stage" aria-label="elapsed time">
      <p class="pre-timer"><span class="pulse"></span>It has been</p>
      <div class="timer" id="timer" aria-live="polite">
        <div class="unit u-days">
          <span class="value" id="days">0</span>
          <span class="label">days</span>
        </div>
        <div class="unit u-hours">
          <span class="value" id="hours">0</span>
          <span class="label">hrs</span>
        </div>
        <div class="unit u-minutes">
          <span class="value" id="minutes">0</span>
          <span class="label">min</span>
        </div>
        <div class="unit u-seconds">
          <span class="value" id="seconds">0</span>
          <span class="label">sec</span>
        </div>
      </div>
      <p class="post-timer">
        since we submitted the paper.
        <em>When will he grade it?</em>
      </p>
      <p class="fine-print">Counting up from May&nbsp;18th, 8&nbsp;AM&nbsp;EST</p>
    </section>

    <section class="activities">
      <h2 class="acts-title">
        In this time, he could've—
        <span class="underline" aria-hidden="true"></span>
      </h2>
      <ul class="activity-list" id="activityList"></ul>
    </section>

    <footer class="foot">
      <p class="foot-stamp">TIME KEEPS MOVING · SO COULD YOU</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
