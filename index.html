<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>When will he finish? (Pause)</title>
  <meta name="description" content="A clock counting up since the paper was submitted — and everything that could have been done in the time it's taken to grade it." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">

    <!-- ================= MAIN TIMER ================= -->
    <section class="board board--main">
      <p class="overline">It has been</p>

      <div class="hero" aria-live="polite">
        <div class="hero-days">
          <span class="big" id="m-days">0</span>
          <span class="big-cap">days</span>
        </div>
        <p class="hero-sub">
          <span id="m-hours">00</span><span class="colon">:</span><span id="m-minutes">00</span><span class="colon">:</span><span id="m-seconds">00</span>
        </p>
      </div>

      <p class="since">since we submitted the paper.</p>
      <p class="ask">When will he finish? <span class="paper">(Pause)</span></p>
      <p class="cta">FINISH GRADING</p>
    </section>

    <!-- ================= SECOND (MINI) TIMER ================= -->
    <section class="board board--mini">
      <p class="overline">It has been</p>

      <div class="hero hero--mini" aria-live="polite">
        <div class="hero-days">
          <span class="big" id="r-days">0</span>
          <span class="big-cap">days</span>
        </div>
        <p class="hero-sub">
          <span id="r-hours">00</span><span class="colon">:</span><span id="r-minutes">00</span><span class="colon">:</span><span id="r-seconds">00</span>
        </p>
      </div>

      <p class="since">since the optional retake was due.</p>
      <p class="ask">When will he finish? <span class="paper">(Pause)</span></p>
      <p class="cta">FINISH GRADING</p>
    </section>

    <!-- ================= ACTIVITIES ================= -->
    <section class="list-section">
      <h2 class="list-title">In this time, he could've—</h2>
      <ul class="activity-list" id="activityList"></ul>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
